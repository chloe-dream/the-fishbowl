<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · The Fishbowl</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <div class="orb"></div>

    <div class="auth-shell">
        <div class="auth-card">
            <svg class="fb-fishbowl" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                <defs>
                    <radialGradient id="fb-water" cx="50%" cy="35%" r="70%">
                        <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.62"/>
                        <stop offset="100%" stop-color="#1e40af" stop-opacity="0.92"/>
                    </radialGradient>
                    <radialGradient id="fb-glass" cx="35%" cy="28%" r="85%">
                        <stop offset="0%"   stop-color="rgba(255,255,255,0.32)"/>
                        <stop offset="55%"  stop-color="rgba(255,255,255,0.04)"/>
                        <stop offset="100%" stop-color="rgba(255,255,255,0.10)"/>
                    </radialGradient>
                    <!-- Bowl interior: rounded body with narrow opening on top -->
                    <clipPath id="fb-bowl-inside">
                        <path d="M50 26 Q50 22 60 22 Q70 22 70 26 L70 30
                                 Q90 36 102 54 Q110 70 102 90 Q90 110 60 110
                                 Q30 110 18 90 Q10 70 18 54 Q30 36 50 30 Z"/>
                    </clipPath>
                </defs>

                <!-- Inside the bowl: water + wave + goldfish + bubbles -->
                <g clip-path="url(#fb-bowl-inside)">
                    <rect x="0" y="40" width="120" height="80" fill="url(#fb-water)"/>
                    <path d="M0 40 Q15 36 30 40 T60 40 T90 40 T120 40 V46 H0 Z"
                          fill="rgba(255,255,255,0.28)"/>
                    <g transform="translate(48 72)">
                        <ellipse cx="0" cy="0" rx="16" ry="9" fill="#f97316"/>
                        <path d="M16 0 L26 -10 L26 10 Z" fill="#f97316"/>
                        <path d="M-2 6 Q3 14 9 8 Z" fill="#fb923c"/>
                        <circle cx="-7" cy="-2" r="1.6" fill="#0a0a0a"/>
                        <ellipse cx="-4" cy="-5" rx="3.5" ry="1.2" fill="rgba(255,255,255,0.5)"/>
                    </g>
                    <circle cx="86" cy="62" r="2.5" fill="rgba(255,255,255,0.6)"/>
                    <circle cx="92" cy="54" r="1.8" fill="rgba(255,255,255,0.5)"/>
                    <circle cx="84" cy="48" r="1.2" fill="rgba(255,255,255,0.45)"/>
                </g>

                <!-- Glass body -->
                <path d="M50 26 Q50 22 60 22 Q70 22 70 26 L70 30
                         Q90 36 102 54 Q110 70 102 90 Q90 110 60 110
                         Q30 110 18 90 Q10 70 18 54 Q30 36 50 30 Z"
                      fill="url(#fb-glass)" stroke="rgba(255,255,255,0.55)"
                      stroke-width="1.6" stroke-linejoin="round"/>

                <!-- Rim ellipse (opening) -->
                <ellipse cx="60" cy="24" rx="10" ry="2.5"
                         fill="rgba(0,0,0,0.35)"
                         stroke="rgba(255,255,255,0.65)" stroke-width="1.4"/>

                <!-- Glass highlight on the upper-left curve -->
                <path d="M25 56 Q28 38 44 32"
                      fill="none" stroke="rgba(255,255,255,0.45)"
                      stroke-width="2.5" stroke-linecap="round"/>
            </svg>
            <h1>THE FISHBOWL</h1>
            <p class="tagline">Your memory lives here. You don't.</p>

            <div class="providers" id="providers">
                <!-- Populated by JS -->
            </div>
            <p id="error" class="error" style="display:none;"></p>
        </div>
    </div>

    <script>
    (async function () {
        const providersEl = document.getElementById("providers");
        const errorEl = document.getElementById("error");

        try {
            const res = await fetch("/api/auth/providers");
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            const providers = await res.json();

            if (!providers || providers.length === 0) {
                // Unconfigured — go to setup
                window.location.href = "/setup";
                return;
            }

            providersEl.innerHTML = providers.map(p => `
                <a class="provider-btn" href="/login/challenge/${p.id}">
                    <span>Continue with ${p.name}</span>
                </a>
            `).join("");
        } catch (err) {
            errorEl.textContent = "Unable to load providers: " + err.message;
            errorEl.style.display = "block";
        }
    })();
    </script>
</body>
</html>
