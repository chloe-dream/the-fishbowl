<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup · The Fishbowl</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/app.css">
</head>
<body>
    <div class="orb"></div>

    <div class="auth-shell">
        <div class="auth-card">
            <div class="fb-logo-mark">
                <div class="top"></div>
                <div class="bottom"></div>
            </div>
            <h1>WELCOME</h1>
            <p class="tagline">Let's configure Google sign-in to get started.</p>

            <form id="setup-form">
                <div class="form-group">
                    <label for="clientId">Google Client ID</label>
                    <input type="text"
                           id="clientId"
                           name="clientId"
                           placeholder="xxxxx.apps.googleusercontent.com"
                           required>
                </div>
                <div class="form-group">
                    <label for="clientSecret">Google Client Secret</label>
                    <input type="password"
                           id="clientSecret"
                           name="clientSecret"
                           placeholder="at least 20 characters"
                           required>
                </div>

                <details style="margin-top: 1rem;">
                    <summary style="cursor: pointer; color: var(--text-muted); font-size: 0.9rem;">
                        Automatic TLS (Let's Encrypt) — optional
                    </summary>
                    <p style="color: var(--text-muted); font-size: 0.85rem; margin: 0.75rem 0;">
                        Fishbowl can issue and renew its own certificate. Requires a public
                        domain pointing at this server and inbound ports 80 + 443. Takes
                        effect after a restart.
                    </p>
                    <div class="form-group">
                        <label for="acmeDomains">Domain name(s)</label>
                        <input type="text"
                               id="acmeDomains"
                               name="acmeDomains"
                               placeholder="fishbowl.example.com">
                    </div>
                    <div class="form-group">
                        <label for="acmeEmail">Contact email</label>
                        <input type="email"
                               id="acmeEmail"
                               name="acmeEmail"
                               placeholder="you@example.com">
                    </div>
                    <label style="display: flex; gap: 0.5rem; align-items: flex-start;
                                  font-size: 0.85rem; color: var(--text-muted);">
                        <input type="checkbox" id="acmeAcceptTos" style="margin-top: 0.2rem;">
                        <span>
                            I accept the
                            <a href="https://letsencrypt.org/repository/"
                               target="_blank" rel="noopener">Let's Encrypt subscriber agreement</a>.
                        </span>
                    </label>
                </details>

                <button type="submit" class="btn primary" style="width:100%; margin-top:1rem;">
                    Save &amp; Continue
                </button>
                <p id="error" class="error" style="display:none;"></p>
            </form>
        </div>
    </div>

    <script>
    (function () {
        const form = document.getElementById("setup-form");
        const errorEl = document.getElementById("error");

        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.style.display = "block";
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            errorEl.style.display = "none";

            const clientId = document.getElementById("clientId").value.trim();
            const clientSecret = document.getElementById("clientSecret").value;

            // Client-side mirrors server-side rules from Task 4.2 of A+ hardening.
            if (!clientId.endsWith(".apps.googleusercontent.com")) {
                showError("Client ID must end with .apps.googleusercontent.com");
                return;
            }
            if (clientSecret.length < 20) {
                showError("Client Secret must be at least 20 characters.");
                return;
            }

            // ACME fields — all optional, but all-or-nothing if the operator starts filling them in.
            const acmeDomains = document.getElementById("acmeDomains").value.trim();
            const acmeEmail = document.getElementById("acmeEmail").value.trim();
            const acmeAcceptTos = document.getElementById("acmeAcceptTos").checked;
            const anyAcme = acmeDomains || acmeEmail || acmeAcceptTos;
            if (anyAcme) {
                if (!acmeDomains) { showError("Enter at least one domain for TLS."); return; }
                if (!acmeEmail || !acmeEmail.includes("@")) {
                    showError("Enter a valid contact email for Let's Encrypt."); return;
                }
                if (!acmeAcceptTos) {
                    showError("You must accept the Let's Encrypt subscriber agreement."); return;
                }
            }

            try {
                const body = { clientId, clientSecret };
                if (anyAcme) {
                    body.acmeDomains = acmeDomains;
                    body.acmeEmail = acmeEmail;
                    body.acmeAcceptTos = true;
                }
                const res = await fetch("/api/setup", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(body)
                });
                if (!res.ok) {
                    const text = await res.text();
                    showError("Server rejected: " + text);
                    return;
                }
                const result = await res.json().catch(() => ({}));
                if (result?.acmeConfigured) {
                    document.querySelector(".auth-card").innerHTML = `
                        <h1>ALMOST THERE</h1>
                        <p class="tagline">TLS is configured. Restart Fishbowl, then
                        visit <strong>https://${acmeDomains.split(",")[0].trim()}</strong>
                        to finish signing in.</p>`;
                } else {
                    window.location.href = "/";
                }
            } catch (err) {
                showError("Request failed: " + err.message);
            }
        });
    })();
    </script>
</body>
</html>
