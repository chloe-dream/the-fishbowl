name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Fishbowl.sln

      - name: Format check
        run: dotnet format Fishbowl.sln --verify-no-changes

      - name: Build
        run: dotnet build Fishbowl.sln -c Release --no-restore -p:ContinuousIntegrationBuild=true

      - name: Test
        run: dotnet test Fishbowl.sln -c Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: TestResults/*.trx

  ui-smoke:
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Fishbowl.sln

      - name: Build UI test project
        run: dotnet build src/Fishbowl.Ui.Tests -c Release --no-restore -p:ContinuousIntegrationBuild=true

      - name: Install Playwright browsers
        run: pwsh src/Fishbowl.Ui.Tests/bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      - name: Run smoke test
        run: dotnet test src/Fishbowl.Ui.Tests -c Release --no-build --logger "trx;LogFileName=ui-smoke.trx" --results-directory TestResults

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-smoke-results
          path: TestResults/*.trx
